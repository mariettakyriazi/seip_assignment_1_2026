apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: echo-api

  template:
    metadata:
      labels:
        app: echo-api

    spec:
      containers:
        - name: echo-api
          image: ghcr.io/mariettakyriazi/echo-api:latest

          ports:
            - containerPort: 3000

          env:
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: WELCOME_MESSAGE

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: NODE_ENV

            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: echo-api-secret
                  key: API_SECRET_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
